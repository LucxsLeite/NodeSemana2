name: CI - Lint, Typecheck and Build

on:
  push:
    branches: ['dev']
  pull_request:
    branches: ['**']

env:
  DUMMY_DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"

jobs:
  lint-test-build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node: [22.x, 24.x]
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'

      - name: Cache Prisma Engine
        uses: actions/cache@v4
        with:
          path: ~/.cache/prisma
          key: ${{ runner.os }}-prisma-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-prisma-

      - name: Install Dependencies
        run: npm ci

      - name: Run Linter
        run: npm run lint

      - name: Type Check
        run: npx tsc --noEmit

      - name: Generate Prisma Client
        env:
          DATABASE_URL: ${{ env.DUMMY_DATABASE_URL }}
        run: npx prisma generate

      - name: Build
        env:
          DATABASE_URL: ${{ env.DUMMY_DATABASE_URL }}
        run: npm run build